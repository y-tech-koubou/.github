<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400" role="img" aria-label="Yテック工房 マーク">
  <title>Yテック工房 — Mark</title>
  <rect width="200" height="200" fill="#FAF7F2"/>

  <!-- 家紋風円 -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#2D5A2D" stroke-width="6"/>

  <!-- 3 leaves（建築・IT・国際協力） -->
  <g fill="#2D5A2D">
    <path d="M100 38 Q 116 64 100 96 Q 84 64 100 38 Z"/>
    <path d="M52 58 Q 80 70 80 102 Q 50 90 52 58 Z"/>
    <path d="M148 58 Q 120 70 120 102 Q 150 90 148 58 Z"/>
  </g>

  <!-- X字に交わる茎 -->
  <g stroke="#2D5A2D" stroke-width="7" fill="none" stroke-linecap="round">
